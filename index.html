<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Random 10</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Temporizador -->
        <div class="countdown-section">
            <p class="countdown-label">Lanzamiento en:</p>
            <div class="countdown-container">
                <div class="countdown-item">
                    <span class="countdown-value" id="days">20</span>
                    <span class="countdown-label-item">Días</span>
                </div>
                <span class="countdown-separator">:</span>
                <div class="countdown-item">
                    <span class="countdown-value" id="hours">00</span>
                    <span class="countdown-label-item">Horas</span>
                </div>
                <span class="countdown-separator">:</span>
                <div class="countdown-item">
                    <span class="countdown-value" id="minutes">00</span>
                    <span class="countdown-label-item">Minutos</span>
                </div>
                <span class="countdown-separator">:</span>
                <div class="countdown-item">
                    <span class="countdown-value" id="seconds">00</span>
                    <span class="countdown-label-item">Segundos</span>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="text-section">
                <h1 class="title">Game Random 10</h1>
                <p class="subtitle">Descubre la magia de lo impredecible</p>
                <p class="description">
                    Sumérgete en una experiencia única donde la aleatoriedad se convierte en diversión. 
                    Cada juego es diferente, cada momento es sorpresa.
                </p>
            </div>
            
            <div class="visual-section">
                <div class="animated-elements">
                    <div class="element element-1"></div>
                    <div class="element element-2"></div>
                    <div class="element element-3"></div>
                    <div class="element element-4"></div>
                    <div class="element element-5"></div>
                </div>
            </div>
        </div>

        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
